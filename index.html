<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fitness App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="hero">
      <h1>Home Workout Coach</h1>
      <p>Bodyweight workouts, calendar tracking, adaptive difficulty, notes, and GitHub sync.</p>
    </header>

    <section class="card stats">
      <div>
        <div class="label">Completed</div>
        <div id="completedCount" class="big">0</div>
      </div>
      <div>
        <div class="label">Streak</div>
        <div id="streakCount" class="big">0</div>
      </div>
      <div>
        <div class="label">This week</div>
        <div id="weekCount" class="big">0</div>
      </div>
    </section>

    <section class="card">
      <h2>Settings</h2>
      <label>Name</label>
      <input id="nameInput" placeholder="Your name" />

      <label>Difficulty</label>
      <div id="difficultyRow" class="chips"></div>

      <label>Focus</label>
      <div id="focusRow" class="chips"></div>

      <div class="sync-header-row">
        <h3>GitHub sync</h3>
        <button id="toggleGithubSectionBtn" type="button" class="toggle-btn">Show</button>
      </div>

      <div id="githubSyncSection" class="hidden-section">
        <label>Owner</label>
        <input id="githubOwnerInput" placeholder="GitHub owner" />

        <label>Repository</label>
        <input id="githubRepoInput" placeholder="Repository name" />

        <label>Branch</label>
        <input id="githubBranchInput" placeholder="main" />

        <label>Data file path</label>
        <input id="githubFilePathInput" placeholder="fitness-data.json" />

        <label>Fine grained GitHub token</label>
        <input id="githubTokenInput" type="password" placeholder="Paste token with Contents read and write access" />

        <label class="checkbox-row">
          <input id="githubAutoSyncInput" type="checkbox" />
          <span>Auto sync after changes</span>
        </label>

        <div class="chips">
          <button id="pushGithubBtn" class="primary">Save to GitHub</button>
          <button id="pullGithubBtn">Restore from GitHub</button>
        </div>
      </div>

      <div id="githubStatus" class="small">Local only, not synced yet.</div>
    </section>

    <section class="card">
      <h2>Today's plan</h2>
      <div id="planBox"></div>
      <button id="completeBtn" class="primary">Mark today complete</button>
      <h3>How did it feel?</h3>
      <div id="feedbackRow" class="chips"></div>
    </section>

    <section class="card">
      <h2>Calendar</h2>
      <div id="monthLabel" class="month-label"></div>
      <div class="weekday-row">
        <span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span>
      </div>
      <div id="calendarGrid" class="calendar-grid"></div>
    </section>

    <section class="card">
      <h2>History</h2>
      <div id="historyList"></div>
    </section>

    <section class="card">
      <h2>Notes</h2>
      <textarea id="notesInput" placeholder="Write what felt good, hard, or what you want tomorrow."></textarea>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
